<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Cosmic Cashless</title>

  <link rel="stylesheet" href="css/styles.css" />

  <link rel="icon" href="data:," />

</head>

<body>

  <!-- ===================================== -->
  <!-- 🌌 NAVBAR -->
  <!-- ===================================== -->
  <header class="navbar">

    <div class="nav-left">

      <h1>Cashless</h1>

      <span class="subtitle">
       By: Cosmis Pass
      </span>

    </div>

    <div class="nav-center">

      <button
        onclick="irMetricas()"
        class="nav-btn"
      >
        📊 Métricas
      </button>

      <button
        onclick="verHistorial()"
        class="nav-btn"
      >
        🧾 Historial
      </button>

    </div>

    <div class="nav-right">

      <div class="usuario-box">

        <span id="usuario-logeado">
          👤 --
        </span>

      </div>

      <button
        onclick="logout()"
        class="logout-btn"
      >
        Salir
      </button>

    </div>

  </header>

  <!-- ===================================== -->
  <!-- 🌌 CONTENIDO -->
  <!-- ===================================== -->
  <main class="pos-container">

    <!-- ===================================== -->
    <!-- 💳 RECARGA -->
    <!-- ===================================== -->
    <section class="panel panel-izq">

      <div class="panel-header">

  <span class="panel-tag">
    MÓDULO
  </span>

  <h2>Recargas</h2>

  <p>
    Agrega saldo a dispositivos registrados
  </p>

</div>

      <!-- ===================================== -->
      <!-- 📷 SCANNER -->
      <!-- ===================================== -->
      <div class="scanner">

        <button
          class="scan-btn"
          onclick="iniciarScanner('recarga')"
        >
          📷 Escanear QR
        </button>

        <div
          id="reader-recarga"
          class="reader-box"
        ></div>

      </div>

      <!-- ===================================== -->
      <!-- 👤 INPUT -->
      <!-- ===================================== -->
      <div class="input-group">

        <label>
          Usuario
        </label>

        <input
          id="userid-recarga"
          autocomplete="off"
          spellcheck="false"
          placeholder="Escanea dispositivo"
        />

      </div>

      <!-- ===================================== -->
      <!-- 💰 INFO -->
      <!-- ===================================== -->
      <div
        id="info-recarga"
        class="info-box"
      >

        <div class="info-placeholder">

           Esperando usuario para recarga

        </div>

      </div>

      <!-- ===================================== -->
      <!-- 💸 MONTOS -->
      <!-- ===================================== -->
      <div class="monto-section">

        <label>
          Selecciona un monto
        </label>

        <div class="montos">

          <button onclick="setMonto(100)">
            $100
          </button>

          <button onclick="setMonto(200)">
            $200
          </button>

          <button onclick="setMonto(500)">
            $500
          </button>

          <button onclick="setMonto(1000)">
            $1000
          </button>

        </div>

      </div>

      <!-- ===================================== -->
      <!-- 💵 MONTO EXTRA -->
      <!-- ===================================== -->
      <div class="input-group">

        <label>
          Otro monto
        </label>

        <input
          id="monto-recarga"
          type="number"
          inputmode="numeric"
          placeholder="$0"
        />

      </div>

      <!-- ===================================== -->
      <!-- 💳 ACCIONES -->
      <!-- ===================================== -->
   <div class="acciones">

  <button
    class="mp-btn"
    onclick="pagarMercadoPago()"
  >
    💳 Mercado Pago
  </button>

  <button
    class="manual-btn"
    onclick="recargar()"
  >
    ⚡ Recarga Manual
  </button>

</div>

    </section>

    <!-- ===================================== -->
    <!-- 🛒 COBRO -->
    <!-- ===================================== -->
    <section class="panel panel-der">

     <div class="panel-header">

  <span class="panel-tag">
    MÓDULO
  </span>

  <h2>Cobros</h2>

  <p>
    Registro de consumos y pagos
  </p>

</div>

      <!-- ===================================== -->
      <!-- 📷 SCANNER -->
      <!-- ===================================== -->
      <div class="scanner">

        <button
          class="scan-btn"
          onclick="iniciarScanner('pago')"
        >
          📷 Escanear QR
        </button>

        <div
          id="reader-pago"
          class="reader-box"
        ></div>

      </div>

      <!-- ===================================== -->
      <!-- 👤 INPUT -->
      <!-- ===================================== -->
      <div class="input-group">

        <label>
          Usuario
        </label>

        <input
          id="userid-pago"
          autocomplete="off"
          spellcheck="false"
          placeholder="Escanea dispositivo"
        />

      </div>

      <!-- ===================================== -->
      <!-- 💰 INFO -->
      <!-- ===================================== -->
      <div
        id="info-pago"
        class="info-box"
      >

        <div class="info-placeholder">

          Esperando usuario para cobrar

        </div>

      </div>

      <!-- ===================================== -->
      <!-- 🍺 PRODUCTOS -->
      <!-- ===================================== -->
      <div class="productos-section">

        <label>
          Productos
        </label>

        <div class="productos">

          <button
            onclick="agregarProducto(1,'Cerveza',70)"
          >
            🍺 Cerveza · $80
          </button>

          <button
            onclick="agregarProducto(2,'Agua',50)"
          >
            💧 Agua · $50
          </button>

          <button
            onclick="agregarProducto(3,'Refresco',50)"
          >
            🥤 Refresco · $50
          </button>

          <button
            onclick="agregarProducto(4,'Vodka',180)"
          >
            🍸 Trago · $180
          </button>

          <button
            onclick="agregarProducto(5,'Six',450)"
          >
            🔥 Six · $450
          </button>

        </div>

      </div>

      <!-- ===================================== -->
      <!-- 🛒 CARRITO -->
      <!-- ===================================== -->
      <div class="carrito-section">

        <label>
          Carrito
        </label>

        <div
          id="carrito"
          class="carrito-box"
        ></div>

      </div>

      <!-- ===================================== -->
      <!-- ⚡ ACCIONES -->
      <!-- ===================================== -->
<div class="checkout-bar">

  <div
    id="total-box"
    class="total-box"
  >
    Total: $0
  </div>

  <button
    class="pagar-btn"
    onclick="pagar()"
  >
    ⚡ Cobrar
  </button>

</div>

<div class="acciones-secundarias">

  <button
    onclick="limpiarCarrito()"
    class="clear-btn"
  >
    🗑 Limpiar carrito
  </button>

</div>

      <!-- ===================================== -->
      <!-- 🔥 QR -->
      <!-- ===================================== -->
      <div
        id="qr-pago"
        class="qr-box"
      ></div>

    </section>

  </main>

<footer class="footer-credit">
  Desarrollado por <strong>Cosmic Pass</strong> 🚀
</footer>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="js/app.js"></script>

</body>
</html>
