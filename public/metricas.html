<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Métricas | Cosmic Cashless</title>

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/metricas.css">

</head>

<body>

<header class="navbar">

  <div class="nav-left">
    <h1>📊 Dashboard</h1>
    <span class="subtitle">
      Resumen operativo
    </span>
  </div>

  <div class="nav-right">

    <button
      class="nav-btn"
      onclick="window.location.href='index.html'"
    >
      ← POS
    </button>

  </div>

</header>

<main class="dashboard">

  <div class="metric-card">

    <h3>💰 Ventas</h3>

    <div
      class="metric-value"
      id="ventas"
    >
      $0
    </div>

  </div>

  <div class="metric-card">

    <h3>🔋 Recargas</h3>

    <div
      class="metric-value"
      id="recargas"
    >
      $0
    </div>

  </div>

  <div class="metric-card">

    <h3>👥 Usuarios</h3>

    <div
      class="metric-value"
      id="usuarios"
    >
      0
    </div>

  </div>

  <div class="metric-card">

    <h3>🏦 Saldo Circulante</h3>

    <div
      class="metric-value"
      id="saldo"
    >
      $0
    </div>

  </div>

</main>

<script src="js/metricas.js"></script>

</body>
</html>
